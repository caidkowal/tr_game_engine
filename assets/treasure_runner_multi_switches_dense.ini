# Multi-room world with switches (denser, more puzzle pressure)

[metadata]
name=MultiRoomSwitchesDense
seed=404

[world]
num_rooms=10
difficulty=7

[room]
width=22
height=16
width_variance=2
height_variance=2
entity_padding=1

[portals]
portals_per_room=4
portals_variance=1
portal_placement=interior
connectivity_chance=45

[treasures]
treasures_per_room=2
treasures_variance=1
treasure_types=3

[pushables]
pushables_per_room=4
pushables_variance=1
pushable_types=3

[switches]
enabled=true

[charset]
wall=#
floor=.
player=@
pushable=O
treasure=$
portal=X
switch_off==
switch_on=+
